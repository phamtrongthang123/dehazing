# Training parameters — PICMUS tissue v5: GroupNorm + ELU for stability
# Key changes vs v4:
#   - normalization: group8 (GroupNorm, 8 groups) instead of batch
#     Reason: BatchNorm with batch_size=4 is theoretically fine (large spatial dims)
#     but GroupNorm is more principled for generative models (per-sample stats)
#   - activation: elu (smoother gradients, standard for NCSNv2 in the original paper)
#   - batch_size: 8 (doubled; A100 has enough memory for channels=64 at batch=8)
#   - All other settings same as v4
epochs:
  desc: Number of epochs to train over
  value: 1000
batch_size:
  desc: Size of each mini-batch
  value: 8
seed:
  desc: Random seed for reproducibility experiments
  value: 1234
lr:
  desc: Learning rate for model
  value: 0.0001
grad_clip:
  desc: Max gradient norm for clipping
  value: 1.0
ema:
  desc: exponential moving average of network weights
  value: 0.9999
save_freq:
  desc: Saving frequency of models in terms of epochs
  value: 20
eval_freq:
  desc: Evaluation frequency of models in terms of epochs
  value: 10
num_img:
  desc: Number of images to plot
  value: 16

# LR schedule
lr_scheduler:
  desc: Learning rate scheduler type (cosine, step, reduce_on_plateau)
  value: cosine
lr_min:
  desc: Minimum LR for cosine schedule (used with lr_scheduler=cosine); T_max=epochs
  value: 0.000001

# Model parameters
model_name:
  desc: Name of the deep generative model
  value: score
score_backbone:
  desc: name of backbone model architecture
  value: NCSNv2
sde:
  desc: Stochastic Differential Equation (SDE) type
  value: simple
sigma:
  desc: Sigma value in SDE
  value: 25.0
num_scales:
  desc: sde property
  value: 1000
reduce_mean:
  desc: reduction type of loss function
  value: true
likelihood_weighting:
  desc: null
  value: false
normalization:
  desc: Type of normalization in neural network (group8 = GroupNorm with 8 groups)
  value: group8
channels:
  desc: channels. List for UNet, and single int for NCSNv2
  value: 64
kernel_size:
  desc: size of convolutional filters
  value: 3
upmode:
  desc: either upconv or upsample
  value: upconv
activation:
  desc: activation function (elu is standard for NCSNv2)
  value: elu
drop_prob:
  desc: dropout probability
  value: null

# Sampling
sampling_method:
  value: pc
predictor:
  value: euler_maruyama
corrector:
  value: none
n_steps_each:
  desc: The number of corrector steps per predictor update.
  value: 1
noise_removal:
  desc: add one-step denoising to the final samples
  value: true
probability_flow:
  desc: solve the reverse-time probability flow ODE when running the predictor
  value: false
snr:
  desc: The signal-to-noise ratio for configuring correctors
  value: 0.17

# Data parameters
data_root:
  desc: Path to data root.
  value: null
dataset_name:
  desc: Name of the dataset
  value: picmus_tissue
image_size:
  desc: Size of image [axial, lateral].
  value: [1024, 128]
image_range:
  desc: Tuple with range of input image neural network.
  value: [-1, 1]
color_mode:
  desc: Either grayscale (1 channel) or rgb (3 channels).
  value: grayscale
npz_key:
  desc: Key in NPZ file
  value: rf
