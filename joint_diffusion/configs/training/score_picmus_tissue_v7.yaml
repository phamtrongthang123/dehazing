# Training parameters — PICMUS tissue v7: fine-tune v5 with t-importance sampling
# Key changes vs v6:
#   - Starts from v5 ep1000 checkpoint (fine-tune, not from scratch)
#   - Lower LR: 1e-5 to 1e-7 (cosine) — appropriate for fine-tuning
#   - Fewer epochs: 300 (sufficient for fine-tuning since model is already well-trained)
#   - Same t_importance_alpha=0.3 as v6
#   - Same architecture as v5 (GroupNorm, ELU, channels=64)
# Rationale: v5 has learned the tissue prior well at all noise levels (uniform t).
#   Fine-tuning with t-importance specifically improves the low-noise regime (t=0.01)
#   without forgetting the large-t scores needed at the start of inference (t=0.8).
epochs:
  desc: Total epochs (v5 resumes at ep1000, so this runs epochs 1000-1299 = 300 fine-tune epochs)
  value: 1300
batch_size:
  desc: Size of each mini-batch
  value: 8
seed:
  desc: Random seed for reproducibility experiments
  value: 1234
lr:
  desc: Learning rate for model (lower for fine-tuning)
  value: 0.00001
grad_clip:
  desc: Max gradient norm for clipping
  value: 1.0
ema:
  desc: exponential moving average of network weights
  value: 0.9999
save_freq:
  desc: Saving frequency of models in terms of epochs
  value: 20
eval_freq:
  desc: Evaluation frequency of models in terms of epochs
  value: 10
num_img:
  desc: Number of images to plot
  value: 16

# LR schedule
lr_scheduler:
  desc: Learning rate scheduler type (cosine, step, reduce_on_plateau)
  value: cosine
lr_min:
  desc: Minimum LR for cosine schedule
  value: 0.0000001

# t-importance sampling: bias training toward small t
t_importance_alpha:
  desc: >
    Concentration parameter for t sampling: t = eps + (T-eps)*u^(1/alpha), u~U[0,1].
    alpha=0.3 → ~25% of samples have t < 0.01 (vs 1% uniform, 25x more small-t training).
  value: 0.3

# Model parameters (same as v5)
model_name:
  desc: Name of the deep generative model
  value: score
score_backbone:
  desc: name of backbone model architecture
  value: NCSNv2
sde:
  desc: Stochastic Differential Equation (SDE) type
  value: simple
sigma:
  desc: Sigma value in SDE
  value: 25.0
num_scales:
  desc: sde property
  value: 1000
reduce_mean:
  desc: reduction type of loss function
  value: true
likelihood_weighting:
  desc: null
  value: false
normalization:
  desc: Type of normalization in neural network (group8 = GroupNorm with 8 groups)
  value: group8
channels:
  desc: channels. List for UNet, and single int for NCSNv2
  value: 64
kernel_size:
  desc: size of convolutional filters
  value: 3
upmode:
  desc: either upconv or upsample
  value: upconv
activation:
  desc: activation function (elu is standard for NCSNv2)
  value: elu
drop_prob:
  desc: dropout probability
  value: null

# Sampling
sampling_method:
  value: pc
predictor:
  value: euler_maruyama
corrector:
  value: none
n_steps_each:
  desc: The number of corrector steps per predictor update.
  value: 1
noise_removal:
  desc: add one-step denoising to the final samples
  value: true
probability_flow:
  desc: solve the reverse-time probability flow ODE when running the predictor
  value: false
snr:
  desc: The signal-to-noise ratio for configuring correctors
  value: 0.17

# Data parameters
data_root:
  desc: Path to data root.
  value: null
dataset_name:
  desc: Name of the dataset
  value: picmus_tissue
image_size:
  desc: Size of image [axial, lateral].
  value: [1024, 128]
image_range:
  desc: Tuple with range of input image neural network.
  value: [-1, 1]
color_mode:
  desc: Either grayscale (1 channel) or rgb (3 channels).
  value: grayscale
npz_key:
  desc: Key in NPZ file
  value: rf
