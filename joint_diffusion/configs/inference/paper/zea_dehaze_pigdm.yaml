## Inference parameters
# path to data root
data_root: /scrfs/storage/tp030/home/f2f_ldm/data
# dataset
run_name: zea_tissue
# checkpoints
run_id:
  sgm: /home/tp030/f2f_ldm/dehazing-diffusion/joint_diffusion/wandb/run-20260131_003253-4fo3e9ll/files
# device
device: 0
# random seed
seed: 1234
# number of images to process
num_img: 5
# keep track of images in each iteration and animate at the end
keep_track: true
# standard deviation of additive white gaussian noise (haze strength gamma)
noise_stddev: 0.5
# type of corruption
corruptor: haze
# whether to corrupt data and use as pairs or assume data is corrupted
paired_data: true
# plot zoomed in version as well (provide coordinates here as list, (x, y, size))
zoom: null

# sample from prior distribution for comparison
show_noise_priors: false
# disable corruptor model (use regular denoising)
disable_corruptor_model: false

limit_n_samples: 100

# B-mode display settings
display_bmode: true
dynamic_range: [-50, 0]  # dB

metrics:
  - psnr
  - ssim
models:
  - sgm

sgm:
  ccdf: 0.8
  lambda_coeff: 0.5
  kappa_coeff: 0.5
  # number of noise scales (i.e. time steps in SDE)
  num_scales: 200
  sde: simple
  sigma: 25
  sampling_method: pc
  predictor: euler_maruyama
  corrector: none
  guidance: companded_projection
  corruptor_run_id: /home/tp030/f2f_ldm/dehazing-diffusion/joint_diffusion/wandb/run-20260131_003249-qdynkwsc/files
  batch_size: 8
  patch_overlap: 6
